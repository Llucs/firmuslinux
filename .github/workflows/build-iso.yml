name: Build Firmus ISO

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'ISO version tag (e.g. 2026.06.19)'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - 'iso/**'
      - '.github/workflows/build-iso.yml'

env:
  ISO_NAME: firmuslinux

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            archiso \
            git \
            squashfs-tools \
            grub \
            libisoburn \
            mtools \
            dosfstools \
            erofs-utils \
            awk \
            sed \
            findutils \
            openssl

      - name: Set ISO version
        id: version
        run: |
          if [ "${{ github.event.inputs.version_tag }}" != "" ]; then
            echo "VERSION=${{ github.event.inputs.version_tag }}" >> $GITHUB_ENV
          else
            echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          fi

      - name: Build ISO with archiso
        run: |
          mkdir -p /tmp/archiso-work
          cd iso
          mkarchiso -v \
            -w /tmp/archiso-work \
            -o out \
            .

      - name: Smoke test ISO in QEMU
        run: |
          pacman -S --noconfirm qemu-user-static qemu-system-x86
          ISO_FILE=$(ls iso/out/*.iso 2>/dev/null | head -1)
          if [ -z "$ISO_FILE" ]; then
            echo "No ISO found in iso/out/"
            exit 1
          fi
          echo "ISO built successfully: $ISO_FILE"
          ls -lh "$ISO_FILE"

      - name: Generate checksums
        run: |
          cd iso/out
          ISO_FILE=$(ls *.iso | head -1)
          sha256sum "$ISO_FILE" > "$ISO_FILE.sha256"
          b2sum "$ISO_FILE" > "$ISO_FILE.b2"
          cat "$ISO_FILE.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: iso-${{ env.VERSION }}
          name: Firmus Linux ${{ env.VERSION }}
          body: |
            ## Firmus Linux ${{ env.VERSION }}

            **Kernel:** 7.0.x (rolling)
            **Initramfs:** dracut 111
            **Installer:** Calamares 3.4.2

            ### Changelog
            - Weekly rolling release with latest Arch Linux packages
            - TCR repository updated
            - See commit history for detailed changes

            ### Verification
            ```
            sha256sum -c firmuslinux-${{ env.VERSION }}-x86_64.iso.sha256
            ```
          files: |
            iso/out/*.iso
            iso/out/*.sha256
            iso/out/*.b2
          draft: false
          prerelease: false
          generate_release_notes: false
