# Firmus Linux default dracut configuration
# Forces hostonly initramfs with comprehensive module inclusion

hostonly=yes
hostonly_cmdline=yes

# Compression
compress="zstd"
compress_args="-1"

# Modules to include
add_dracutmodules+=" btrfs snapper lvm dm dmraid crypt mdraid "
add_dracutmodules+=" nfs network kernel-modules "

# Filesystem support
add_drivers+=" btrfs ext4 xfs vfat nls_iso8859-1 nls_utf8 "

# Firmware inclusion
add_firmware+=" yes "

# Generate UKI alongside standalone initramfs
uefi=yes
uefi_stub="/usr/lib/systemd/boot/efi/linuxx64.efi.stub"
uefi_output_dir="/boot/EFI/Linux/"

# Generate standalone initramfs for grub-btrfs compatibility
generate_standalone_initramfs=yes
