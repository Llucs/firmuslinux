# Firmus Linux pacman configuration

[options]
ParallelDownloads = 10
Color
CheckSpace
ILoveCandy
VerbosePkgLists

# Disable mkinitcpio — Firmus uses dracut exclusively
# mkinitcpio is intentionally not installed
# If accidentally installed, these hooks prevent its use
NoExtract = etc/mkinitcpio.conf etc/mkinitcpio.d/*
