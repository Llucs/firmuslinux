# Firmus Linux GRUB configuration
set default="0"
set timeout=5
set gfxmode=auto
set gfxpayload=keep

insmod all_video
insmod gfxterm
insmod part_gpt
insmod part_msdos
insmod btrfs
insmod ext2
insmod fat
insmod chain

# Load theme
if [ -f "${prefix}/themes/firmus/theme.txt" ]; then
  set theme="${prefix}/themes/firmus/theme.txt"
fi

# Load background
if [ -f "${prefix}/themes/firmus/background.png" ]; then
  background_image "${prefix}/themes/firmus/background.png"
fi

set color_normal=white/black
set color_highlight=cyan/dark-gray

menuentry "Firmus Linux" {
  linux /vmlinuz-linux root=UUID=ROOT_UUID rw quiet splash nvidia_drm.modeset=1
  initrd /initramfs-linux.img
}

menuentry "Firmus Linux (Fallback)" {
  linux /vmlinuz-linux root=UUID=ROOT_UUID rw splash nvidia_drm.modeset=1
  initrd /initramfs-linux-fallback.img
}

menuentry "Firmus Linux (LTS Kernel)" {
  linux /vmlinuz-linux-lts root=UUID=ROOT_UUID rw quiet splash nvidia_drm.modeset=1
  initrd /initramfs-linux-lts.img
}

menuentry "System Firmware" {
  fwsetup
}

menuentry "Reboot" {
  reboot
}

menuentry "Shutdown" {
  halt
}

if [ -f "${prefix}/grub-btrfs.cfg" ]; then
  submenu "Snapshots" {
    source "${prefix}/grub-btrfs.cfg"
  }
fi
