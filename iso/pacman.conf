# Firmus Linux pacman configuration for ISO build
#
# This file is used by mkarchiso during ISO generation.
# The installed system uses /etc/pacman.conf from airootfs.

[options]
HoldPkg     = pacman glibc
Architecture = auto
Color
CheckSpace
ParallelDownloads = 10
ILoveCandy

# Firmus Trusted Community Repository (unavailable during ISO build — enabled in installed system)
# [firmus]
# SigLevel = Required TrustedOnly
# Server = https://firmuslinux.github.io/firmuslinux/x86_64

# Official Arch Linux repositories
[core]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/mirrorlist

[extra]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/mirrorlist

[multilib]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/mirrorlist
