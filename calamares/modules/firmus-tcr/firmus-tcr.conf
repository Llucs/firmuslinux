# Firmus Linux — TCR repository configuration

command: |
  #!/usr/bin/env bash
  set -euo pipefail

  ROOT_MOUNT="{{{ ROOT }}}"

  echo "[firmus-tcr] Configuring TCR repository..."

  cat >> "$ROOT_MOUNT/etc/pacman.conf" << 'TCRCONF'

[firmus]
SigLevel = Required TrustedOnly
Server = https://firmuslinux.github.io/firmuslinux/x86_64
TCRCONF

  if [ -f "$ROOT_MOUNT/usr/share/firmus/keyring/firmus.gpg" ]; then
    chroot "$ROOT_MOUNT" pacman-key --add /usr/share/firmus/keyring/firmus.gpg 2>/dev/null || true
    chroot "$ROOT_MOUNT" pacman-key --lsign-key "Firmus Linux Signing Key" 2>/dev/null || true
  fi

  chroot "$ROOT_MOUNT" pacman -Sy --noconfirm firmus-keyring 2>/dev/null || {
    echo "[firmus-tcr] Warning: Could not install firmus-keyring. Import manually."
  }

  echo "[firmus-tcr] TCR configuration complete"
