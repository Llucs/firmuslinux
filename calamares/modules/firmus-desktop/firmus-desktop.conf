# Firmus Linux — Desktop environment post-install optimization

command: |
  #!/usr/bin/env bash
  set -euo pipefail

  ROOT_MOUNT="{{{ ROOT }}}"
  INSTALL_USER="{{{ INSTALL_USER }}}"

  echo "[firmus-desktop] Configuring desktop optimizations..."

  if chroot "$ROOT_MOUNT" which pipewire &>/dev/null; then
    echo "[firmus-desktop] Enabling PipeWire..."
    chroot "$ROOT_MOUNT" systemctl enable pipewire.service 2>/dev/null || true
    chroot "$ROOT_MOUNT" systemctl enable pipewire-pulse.service 2>/dev/null || true
    chroot "$ROOT_MOUNT" systemctl enable wireplumber.service 2>/dev/null || true
  fi

  if chroot "$ROOT_MOUNT" which NetworkManager &>/dev/null; then
    echo "[firmus-desktop] Enabling NetworkManager..."
    chroot "$ROOT_MOUNT" systemctl enable NetworkManager.service 2>/dev/null || true
  fi

  if chroot "$ROOT_MOUNT" which bluetoothctl &>/dev/null; then
    echo "[firmus-desktop] Enabling Bluetooth..."
    chroot "$ROOT_MOUNT" systemctl enable bluetooth.service 2>/dev/null || true
  fi

  if chroot "$ROOT_MOUNT" which cups &>/dev/null; then
    echo "[firmus-desktop] Enabling CUPS..."
    chroot "$ROOT_MOUNT" systemctl enable cups.service 2>/dev/null || true
  fi

  if chroot "$ROOT_MOUNT" which fstrim &>/dev/null; then
    echo "[firmus-desktop] Enabling fstrim.timer..."
    chroot "$ROOT_MOUNT" systemctl enable fstrim.timer 2>/dev/null || true
  fi

  if chroot "$ROOT_MOUNT" which flatpak &>/dev/null; then
    echo "[firmus-desktop] Configuring Flatpak..."
    chroot "$ROOT_MOUNT" flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo 2>/dev/null || true
    chroot "$ROOT_MOUNT" flatpak install -y flathub org.mozilla.firefox 2>/dev/null || true
  fi

  echo "[firmus-desktop] Enabling Firmus systemd services..."
  chroot "$ROOT_MOUNT" systemctl enable firmus-kernel-cleanup.service 2>/dev/null || true
  chroot "$ROOT_MOUNT" systemctl enable firmus-tcr-sync.timer 2>/dev/null || true

  echo "[firmus-desktop] Desktop optimization complete"
