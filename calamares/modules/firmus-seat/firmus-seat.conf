# Firmus Linux — seatd user group configuration
# Ensures the installed user has seat group membership for Wayland compositors

command: |
  #!/usr/bin/env bash
  set -euo pipefail

  ROOT_MOUNT="{{{ ROOT }}}"
  INSTALL_USER="{{{ INSTALL_USER }}}"

  echo "[firmus-seat] Configuring seat group for user '$INSTALL_USER'..."

  chroot "$ROOT_MOUNT" groupadd -f seat 2>/dev/null || true
  chroot "$ROOT_MOUNT" usermod -a -G seat "$INSTALL_USER" 2>/dev/null || {
    echo "[firmus-seat] Warning: Could not add user to seat group"
  }

  chroot "$ROOT_MOUNT" systemctl enable seatd 2>/dev/null || true

  echo "[firmus-seat] seat configuration complete"
