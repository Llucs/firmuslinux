# Firmus Linux — Bootloader post-install configuration

command: |
  #!/usr/bin/env bash
  set -euo pipefail

  ROOT_MOUNT="{{{ ROOT }}}"

  echo "[firmus-bootloader] Configuring bootloader..."

  if chroot "$ROOT_MOUNT" bootctl status 2>/dev/null | grep -q "Boot Loader"; then
    echo "[firmus-bootloader] systemd-boot detected"

    mkdir -p "$ROOT_MOUNT/efi/loader/entries"

    cat > "$ROOT_MOUNT/efi/loader/loader.conf" << 'LOADERCONF'
default firmus
timeout 5
console-mode max
editor yes
LOADERCONF

    cat > "$ROOT_MOUNT/efi/loader/entries/firmus.conf" << 'ENTRYCONF'
title Firmus Linux
linux /vmlinuz-linux
initrd /initramfs-linux.img
options root=UUID={{{ ROOT_UUID }}} rw quiet splash nvidia_drm.modeset=1
ENTRYCONF
  fi

  if [ -f "$ROOT_MOUNT/boot/grub/grub.cfg" ]; then
    echo "[firmus-bootloader] Configuring GRUB..."
    chroot "$ROOT_MOUNT" grub-mkconfig -o /boot/grub/grub.cfg 2>/dev/null || true
  fi

  echo "[firmus-bootloader] Bootloader configuration complete"
