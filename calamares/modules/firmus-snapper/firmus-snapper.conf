# Firmus Linux — Snapper Btrfs snapshot configuration

command: |
  #!/usr/bin/env bash
  set -euo pipefail

  ROOT_MOUNT="{{{ ROOT }}}"

  echo "[firmus-snapper] Configuring snapper..."

  FSTYPE=$(chroot "$ROOT_MOUNT" findmnt -n -o FSTYPE / 2>/dev/null || echo "")

  if [ "$FSTYPE" != "btrfs" ]; then
    echo "[firmus-snapper] Root filesystem is $FSTYPE, not btrfs — skipping snapper config"
    exit 0
  fi

  chroot "$ROOT_MOUNT" umount /.snapshots 2>/dev/null || true
  chroot "$ROOT_MOUNT" snapper -c root create-config / 2>/dev/null || {
    echo "[firmus-snapper] snapper config already exists"
  }

  cat > "$ROOT_MOUNT/etc/snapper/configs/root" << 'SNAPPERCONF'
SUBVOLUME="/"
FSTYPE="btrfs"
TIMELINE_CREATE="yes"
TIMELINE_CLEANUP="yes"
TIMELINE_MIN_AGE="1800"
TIMELINE_LIMIT_DAILY="5"
TIMELINE_LIMIT_WEEKLY="10"
TIMELINE_LIMIT_MONTHLY="5"
TIMELINE_LIMIT_YEARLY="2"
NUMBER_CLEANUP="yes"
NUMBER_MIN_AGE="1800"
NUMBER_LIMIT="50"
NUMBER_LIMIT_IMPORTANT="10"
ALLOW_GROUPS="wheel"
SNAPPERCONF

  chroot "$ROOT_MOUNT" systemctl enable snapper-timeline.service 2>/dev/null || true
  chroot "$ROOT_MOUNT" systemctl enable snapper-cleanup.service 2>/dev/null || true

  echo "[firmus-snapper] snapper configuration complete"
