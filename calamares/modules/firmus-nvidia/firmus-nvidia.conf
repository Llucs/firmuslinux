# Firmus Linux — NVIDIA auto-configuration
# Detects NVIDIA GPU and installs/configures drivers

command: |
  #!/usr/bin/env bash
  set -euo pipefail

  ROOT_MOUNT="{{{ ROOT }}}"

  detect_nvidia() {
    chroot "$ROOT_MOUNT" lspci -nn 2>/dev/null | grep -qi nvidia
  }

  install_nvidia() {
    echo "[firmus-nvidia] Installing NVIDIA drivers..."

    chroot "$ROOT_MOUNT" pacman -S --noconfirm \
      nvidia-open-dkms \
      nvidia-utils \
      lib32-nvidia-utils \
      nvidia-settings

    echo "[firmus-nvidia] Configuring modeset..."
    cat > "$ROOT_MOUNT/etc/modprobe.d/nvidia.conf" << 'NVIDIACONF'
options nvidia_drm modeset=1 fbdev=1
options nvidia NVreg_PreserveVideoMemoryAllocations=1
NVIDIACONF

    echo "[firmus-nvidia] Adding NVIDIA modules to dracut..."
    cat > "$ROOT_MOUNT/etc/dracut.conf.d/20-nvidia.conf" << 'DRACUTCONF'
add_drivers+=" nvidia nvidia_modeset nvidia_uvm nvidia_drm "
force_drivers+=" nvidia_drm "
DRACUTCONF

    echo "[firmus-nvidia] Rebuilding initramfs..."
    chroot "$ROOT_MOUNT" dracut --force
  }

  if detect_nvidia; then
    echo "[firmus-nvidia] NVIDIA GPU detected"
    install_nvidia
    echo "[firmus-nvidia] NVIDIA configuration complete"
  else
    echo "[firmus-nvidia] No NVIDIA GPU detected — skipping"
  fi
